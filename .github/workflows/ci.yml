name: CI

on:
  pull_request:
    branches: [master, development] # gate PRs into both protected branches
  push:
    branches: [master, development] # run CI on both long-lived branches

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # Stage 5.5 e2e — install only chromium (smaller download than the
      # full browser matrix). Skipped on long-lived feature branches.
      - name: Install Playwright browsers
        if: ${{ !startsWith(github.ref, 'refs/heads/feature/long-') }}
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E (playwright)
        if: ${{ !startsWith(github.ref, 'refs/heads/feature/long-') }}
        run: pnpm e2e
        env:
          CI: 'true'

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload bundle stats (on master)
        if: github.ref == 'refs/heads/master' && success()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats
          path: dist/
          retention-days: 7
